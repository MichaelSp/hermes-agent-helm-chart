suite: operator mode
templates:
  - hermes-tenants.yaml

tests:
  - it: does not render HermesTenant resources by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders HermesTenant resources in operator mode
    values:
      - operator-values.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: HermesTenant

  - it: sets HermesTenant apiVersion
    values:
      - operator-values.yaml
    asserts:
      - equal:
          path: apiVersion
          value: hermes.ai/v1alpha1

  - it: sets tenant release namespace
    values:
      - operator-values.yaml
    asserts:
      - equal:
          path: spec.release.namespace
          value: tenant-a

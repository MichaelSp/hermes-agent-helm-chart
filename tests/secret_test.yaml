suite: secret
templates:
  - secret.yaml

tests:
  - it: renders a chart-managed Secret when secrets have values
    set:
      secrets.API_SERVER_KEY: test-key
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret

  - it: does not render a chart-managed Secret when all secrets are empty
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render a chart-managed Secret when externalSecret is enabled
    values:
      - external-secret-values.yaml
    asserts:
      - hasDocuments:
          count: 0

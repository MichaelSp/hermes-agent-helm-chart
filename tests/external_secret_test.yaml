suite: external secret
templates:
  - external-secret.yaml

tests:
  - it: does not render an ExternalSecret by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders an ExternalSecret when enabled
    values:
      - external-secret-values.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - equal:
          path: apiVersion
          value: external-secrets.io/v1beta1

  - it: sets the target secret name
    values:
      - external-secret-values.yaml
    asserts:
      - equal:
          path: spec.target.name
          value: hermes-agent-external-secret

  - it: sets the SecretStore reference name
    values:
      - external-secret-values.yaml
    asserts:
      - equal:
          path: spec.secretStoreRef.name
          value: platform-secrets

  - it: sets the SecretStore reference kind
    values:
      - external-secret-values.yaml
    asserts:
      - equal:
          path: spec.secretStoreRef.kind
          value: ClusterSecretStore

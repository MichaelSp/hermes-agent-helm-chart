{{- if .Values.ingress.enabled }}
{{- if not .Values.service.enabled }}
{{- fail "ingress.enabled=true requires service.enabled=true" }}
{{- end }}
{{- $ports := include "hermes-agent.effectiveServicePorts" . | fromYamlArray -}}
{{- if eq (len $ports) 0 }}
{{- fail "ingress.enabled=true requires at least one effective service port" }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "hermes-agent.fullname" . }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          {{- $defaultPort := default (include "hermes-agent.primaryServicePortNumber" $) $.Values.ingress.servicePortNumber }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "hermes-agent.fullname" $ }}
                port:
                  number: {{ default $defaultPort .servicePortNumber }}
          {{- end }}
    {{- end }}
{{- end }}

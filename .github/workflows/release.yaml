name: Release Chart

on:
  push:
    branches:
      - main

concurrency:
  group: chart-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect Docker Release Changes
    runs-on: ubuntu-latest
    outputs:
      docker_changed: ${{ steps.filter.outputs.docker_changed }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check changed files
        id: filter
        run: |
          CHANGED_FILES="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          if printf '%s\n' "${CHANGED_FILES}" | grep -Eq '^(Dockerfile|\.github/workflows/docker-release\.yaml)$'; then
            echo "docker_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "docker_changed=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Package & Publish OCI Chart
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.docker_changed != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: "4.2.2"

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Package chart
        id: package
        if: ${{ steps.tag.outputs.new_tag != '' }}
        run: |
          VERSION="${{ steps.tag.outputs.new_version }}"
          CHART_FILE="hermes-agent-${VERSION}.tgz"
          helm package . \
            --version "${VERSION}"
          echo "chart_file=${CHART_FILE}" >> "$GITHUB_OUTPUT"

      - name: Push chart to GHCR
        if: ${{ steps.tag.outputs.new_tag != '' }}
        run: |
          CHART_FILE="${{ steps.package.outputs.chart_file }}"
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          helm push "$CHART_FILE" "oci://ghcr.io/${OWNER}"

      - name: Create GitHub Release
        if: ${{ steps.tag.outputs.new_tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.new_tag }}"
          CHART_FILE="${{ steps.package.outputs.chart_file }}"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            "$CHART_FILE"

name: Docker Release

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - .github/workflows/docker-release.yaml
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile
      - .github/workflows/docker-release.yaml

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: false

env:
  # renovate: datasource=github-tags depName=NousResearch/hermes-agent versioning=loose
  HERMES_SOURCE_REF: v2026.6.19

jobs:
  publish:
    name: Build and Publish Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout chart repo
        uses: actions/checkout@v7.0.0
        with:
          path: chart-repo

      - name: Checkout Hermes source
        uses: actions/checkout@v7.0.0
        with:
          repository: NousResearch/hermes-agent
          ref: ${{ env.HERMES_SOURCE_REF }}
          path: hermes-source

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/hermes-agent/docker" >> "$GITHUB_OUTPUT"

      - name: Prepare build context
        id: source
        run: |
          cp chart-repo/Dockerfile hermes-source/Dockerfile
          echo "sha=$(git -C hermes-source rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute Docker release tag
        id: release
        run: |
          SOURCE_REF="${{ env.HERMES_SOURCE_REF }}"
          SOURCE_REF="${SOURCE_REF#v}"
          echo "tag=docker-v${SOURCE_REF}" >> "$GITHUB_OUTPUT"

      - name: Compute Docker tags
        id: tags
        run: |
          IMAGE="${{ steps.image.outputs.name }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAGS="${IMAGE}:pr-${{ github.event.pull_request.number }}"
          else
            RELEASE_TAG="${{ steps.release.outputs.tag }}"
            TAGS="$(printf '%s\n%s\n' "${IMAGE}:${RELEASE_TAG}" "${IMAGE}:latest")"
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./hermes-source
          file: ./hermes-source/Dockerfile
          build-args: |
            HERMES_GIT_SHA=${{ steps.source.outputs.sha }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=hermes-docker-release
          cache-to: type=gha,scope=hermes-docker-release,mode=max

      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ./chart-repo
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" \
              --title "${TAG}" \
              --generate-notes
          fi

name: Docker Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build and Publish Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout chart repo
        uses: actions/checkout@v7
        with:
          path: chart-repo

      - name: Checkout Hermes source
        uses: actions/checkout@v7
        with:
          repository: NousResearch/hermes-agent
          path: hermes-source

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Prepare build context
        id: source
        run: |
          cp chart-repo/Dockerfile hermes-source/Dockerfile
          echo "sha=$(git -C hermes-source rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./hermes-source
          file: ./hermes-source/Dockerfile
          build-args: |
            HERMES_GIT_SHA=${{ steps.source.outputs.sha }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

name: Docker Release

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - .github/workflows/docker-release.yaml
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile
      - .github/workflows/docker-release.yaml

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and Publish Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout chart repo
        uses: actions/checkout@v7
        with:
          path: chart-repo

      - name: Checkout Hermes source
        uses: actions/checkout@v7
        with:
          repository: NousResearch/hermes-agent
          path: hermes-source

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/hermes-agent/docker" >> "$GITHUB_OUTPUT"

      - name: Prepare build context
        id: source
        run: |
          cp chart-repo/Dockerfile hermes-source/Dockerfile
          echo "sha=$(git -C hermes-source rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Bump Docker version and push tag
        id: tag
        if: ${{ github.event_name == 'push' }}
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: docker-v

      - name: Compute Docker tags
        id: tags
        run: |
          IMAGE="${{ steps.image.outputs.name }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAGS="${IMAGE}:pr-${{ github.event.pull_request.number }}"
          else
            VERSION="${{ steps.tag.outputs.new_version }}"
            TAGS="$(printf '%s\n%s\n' "${IMAGE}:${VERSION}" "${IMAGE}:latest")"
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: ${{ github.event_name == 'push' && steps.tag.outputs.new_tag != '' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./hermes-source
          file: ./hermes-source/Dockerfile
          build-args: |
            HERMES_GIT_SHA=${{ steps.source.outputs.sha }}
          push: ${{ github.event_name == 'push' && steps.tag.outputs.new_tag != '' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=hermes-docker-release
          cache-to: type=gha,scope=hermes-docker-release,mode=max

      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' && steps.tag.outputs.new_tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ./chart-repo
        run: |
          TAG="${{ steps.tag.outputs.new_tag }}"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes

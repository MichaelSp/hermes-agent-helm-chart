name: Docker Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile
      - .github/workflows/docker-release.yaml

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect Docker Release Changes
    runs-on: ubuntu-latest
    outputs:
      docker_changed: ${{ steps.filter.outputs.docker_changed }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check changed files
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          CHANGED_FILES="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"
          if printf '%s\n' "${CHANGED_FILES}" | grep -Eq '^(Dockerfile|\.github/workflows/docker-release\.yaml)$'; then
            echo "docker_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "docker_changed=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Build and Publish Image
    needs: detect-changes
    if: ${{ github.event_name == 'pull_request' || needs.detect-changes.outputs.docker_changed == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout chart repo
        uses: actions/checkout@v7
        with:
          path: chart-repo

      - name: Checkout Hermes source
        uses: actions/checkout@v7
        with:
          repository: NousResearch/hermes-agent
          path: hermes-source

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Prepare build context
        id: source
        run: |
          cp chart-repo/Dockerfile hermes-source/Dockerfile
          echo "sha=$(git -C hermes-source rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Bump Docker version and push tag
        id: tag
        if: ${{ github.event_name == 'push' }}
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: docker-v

      - name: Compute Docker tags
        id: tags
        run: |
          IMAGE="${{ steps.image.outputs.name }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAGS="${IMAGE}:pr-${{ github.event.pull_request.number }}"
          else
            VERSION="${{ steps.tag.outputs.new_version }}"
            TAGS="$(printf '%s\n%s\n' "${IMAGE}:${VERSION}" "${IMAGE}:latest")"
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: ${{ github.event_name == 'push' && steps.tag.outputs.new_tag != '' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./hermes-source
          file: ./hermes-source/Dockerfile
          build-args: |
            HERMES_GIT_SHA=${{ steps.source.outputs.sha }}
          push: ${{ github.event_name == 'push' && steps.tag.outputs.new_tag != '' }}
          tags: ${{ steps.tags.outputs.tags }}

      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' && steps.tag.outputs.new_tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.new_tag }}"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes

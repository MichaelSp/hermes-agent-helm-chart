name: PR Validation

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Helm Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: "4.2.0"

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --verify=false

      - name: Lint chart
        run: helm lint .

      - name: Run unit tests
        run: helm unittest .
